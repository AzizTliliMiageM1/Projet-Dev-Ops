name: CI - Maven Build (MAIN WORKFLOW)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Backend (from backend/ directory)
        working-directory: ./backend
        run: mvn -B clean package -DskipTests -Dsentinel.skip=true
        env:
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          MAIL_USERNAME: test
          MAIL_PASSWORD: test

      - name: Upload build artifact (jar)
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: backend/target/gestion-abonnements-*.jar
        if: success()
        
      - name: Build success notification
        if: success()
        run: echo "✅ Build successful! Artifact ready for deployment."
        
      - name: Build failure notification  
        if: failure()
        run: echo "❌ Build failed. Check logs above for errors."
